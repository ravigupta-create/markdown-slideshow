<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Markdown Slideshow</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
<style>
  html, body { height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  #editor {
    font-family: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    font-size: 13.5px;
    line-height: 1.55;
    tab-size: 2;
    resize: none;
  }
  #editor::selection { background: rgba(16, 185, 129, 0.35); }
  .btn { transition: background-color 120ms, transform 120ms; }
  .btn:active { transform: translateY(1px); }
  .pulse-ok { animation: pulseOk 1.2s ease; }
  @keyframes pulseOk {
    0%   { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.6); }
    100% { box-shadow: 0 0 0 14px rgba(16, 185, 129, 0); }
  }
  /* Hide scrollbar styling polish */
  textarea::-webkit-scrollbar { width: 10px; }
  textarea::-webkit-scrollbar-thumb { background: #334155; border-radius: 5px; }
  textarea::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body class="h-screen flex flex-col bg-slate-900 text-slate-100 overflow-hidden">

<header class="flex flex-wrap items-center justify-between gap-3 px-5 py-3 border-b border-slate-700 bg-slate-800/70 backdrop-blur">
  <div class="flex items-center gap-3">
    <span class="text-2xl leading-none">🎞️</span>
    <h1 class="text-lg font-semibold tracking-tight">Markdown Slideshow</h1>
    <span class="hidden sm:inline-block text-[11px] px-2 py-0.5 rounded-full bg-emerald-500/15 text-emerald-300 border border-emerald-500/30">
      Offline · $0 · No backend
    </span>
  </div>
  <div class="flex flex-wrap items-center gap-2">
    <button id="openBtn"   class="btn px-3 py-1.5 text-sm rounded-md bg-slate-700 hover:bg-slate-600" title="Open a .md file from your computer">📂 Open .md</button>
    <label class="inline-flex items-center gap-2 px-2 py-1 text-sm rounded-md bg-slate-700/60 border border-slate-600">
      <span class="text-slate-300">Theme</span>
      <select id="themeSelect"
              class="bg-slate-900 border border-slate-600 rounded px-2 py-0.5 text-slate-100 text-sm focus:outline-none focus:border-emerald-500">
        <option value="black">Black</option>
        <option value="white">White</option>
        <option value="league">League</option>
        <option value="serif">Serif</option>
      </select>
    </label>
    <label class="inline-flex items-center gap-2 px-2 py-1 text-sm rounded-md bg-slate-700/60 border border-slate-600">
      <span class="text-slate-300">Font</span>
      <select id="fontSelect"
              class="bg-slate-900 border border-slate-600 rounded px-2 py-0.5 text-slate-100 text-sm focus:outline-none focus:border-emerald-500">
        <option value="">Theme default</option>
        <option value="Inter">Inter</option>
        <option value="Roboto">Roboto</option>
        <option value="Lato">Lato</option>
        <option value="Open Sans">Open Sans</option>
        <option value="Montserrat">Montserrat</option>
        <option value="Source Sans 3">Source Sans 3</option>
        <option value="Playfair Display">Playfair Display</option>
        <option value="Merriweather">Merriweather</option>
        <option value="JetBrains Mono">JetBrains Mono</option>
      </select>
    </label>
    <span class="hidden md:inline-block w-px h-6 bg-slate-600 mx-1"></span>
    <button id="presenterBtn" class="btn px-3 py-1.5 text-sm rounded-md bg-indigo-500 hover:bg-indigo-400 text-white font-medium" title="Open Presenter Console (current slide, next, timer, notes)">🎤 Presenter</button>
    <button id="copyBtn"   class="btn px-3 py-1.5 text-sm rounded-md bg-slate-700 hover:bg-slate-600">📋 Copy Markdown</button>
    <button id="shareBtn"  class="btn px-3 py-1.5 text-sm rounded-md bg-slate-700 hover:bg-slate-600" title="Compress the deck into a sharable URL — recipients see it instantly, no server needed">🔗 Share URL</button>
    <button id="pdfBtn"    class="btn px-3 py-1.5 text-sm rounded-md bg-slate-700 hover:bg-slate-600">🖨️ Print to PDF</button>
    <button id="exportBtn" class="btn px-3 py-1.5 text-sm rounded-md bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-semibold">⬇ Export Offline HTML</button>
    <input id="fileFallback" type="file" accept=".md,.markdown,text/markdown,text/plain" class="hidden">
  </div>
</header>

<main class="flex-1 grid grid-cols-1 lg:grid-cols-2 gap-3 p-3 min-h-0">

  <!-- Editor -->
  <section id="editorSection" class="relative flex flex-col min-h-0 rounded-lg overflow-hidden border border-slate-700 bg-slate-800/40">
    <div class="flex items-center justify-between px-3 py-2 border-b border-slate-700 bg-slate-800">
      <div class="flex items-center gap-4 text-sm">
        <span class="font-medium text-slate-200">Editor</span>
        <label class="inline-flex items-center gap-2 cursor-pointer select-none text-slate-300">
          <input id="syncToggle" type="checkbox" checked class="accent-emerald-500 w-4 h-4">
          <span>Real-time Sync</span>
        </label>
        <span class="hidden xl:inline text-[11px] text-slate-500">drop an image anywhere to insert as base64 →</span>
      </div>
      <div class="text-xs text-slate-400 tabular-nums">
        <span id="charCount">0</span> chars · <span id="slideCount">0</span> slides
      </div>
    </div>

    <!-- Drag-and-drop overlay (hidden until a file is dragged in) -->
    <div id="dropOverlay" class="hidden absolute inset-0 z-20 pointer-events-none flex items-center justify-center bg-emerald-500/15 backdrop-blur-[1px] border-2 border-dashed border-emerald-400 rounded-lg">
      <div class="text-emerald-100 text-base font-medium px-5 py-3 rounded-lg bg-emerald-500/30 border border-emerald-400 shadow-lg">
        🖼️ Drop image to embed as <code class="bg-emerald-700/40 px-1 rounded">![](data:…)</code>
      </div>
    </div>
    <textarea id="editor" spellcheck="false"
      class="w-full p-4 bg-slate-900 text-slate-100 outline-none" style="flex: 1 1 65%;"></textarea>

    <!-- Speaker notes pane -->
    <div class="flex flex-col" style="flex: 0 0 35%; min-height: 140px;">
      <div class="flex items-center justify-between px-3 py-2 border-y border-slate-700 bg-slate-800">
        <div class="flex items-center gap-2">
          <span class="text-sm font-medium text-slate-200">📝 Speaker Notes</span>
          <span class="text-[11px] text-slate-500">written as <code class="text-slate-400">Note:</code> in the slide</span>
        </div>
        <span id="notesLabel" class="text-xs text-slate-400 tabular-nums">Slide 1 of 1</span>
      </div>
      <textarea id="notesEditor" spellcheck="false"
        placeholder="Notes for the slide your cursor is on. Auto-synced into the markdown above."
        class="flex-1 w-full p-4 bg-slate-950 text-slate-100 outline-none"
        style="font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 13px; line-height: 1.5; resize: none;"></textarea>
    </div>
  </section>

  <!-- Preview -->
  <section class="flex flex-col min-h-0 rounded-lg overflow-hidden border border-slate-700">
    <div class="flex items-center justify-between px-3 py-2 border-b border-slate-700 bg-slate-800">
      <span class="text-sm font-medium text-slate-200">Preview</span>
      <button id="refreshBtn" class="text-xs text-slate-400 hover:text-slate-100">↻ Refresh</button>
    </div>
    <iframe id="preview" title="Slide preview" class="flex-1 w-full bg-black border-0"></iframe>
  </section>

</main>

<script>
/* ------------------------------------------------------------------ *
 * Markdown Slideshow — single-file app
 * ------------------------------------------------------------------ */

const SAMPLE = `# Markdown Slideshow

Type Markdown → get slides.
No install · No signup · No fees.

Press → or Space to advance

---

## How separators work

- \`---\` on its own line starts a **new slide**
- \`--\` on its own line starts a **vertical sub-slide**
- Everything else is plain Markdown

---

## Lists & emphasis

- **Bold** with \`**...**\`
- *Italic* with \`*...*\`
- \`inline code\` with backticks
- Combine them however you like

---

## Code blocks, animated

<small>The numbers in brackets step through line highlights as you press →</small>

\`\`\`js [1-3|4-5|all]
function greet(name) {
  return \`Hello, \${name}!\`;
}
const result = greet('world');
console.log(result);
\`\`\`

Note: Walk through the function definition first, then show the call site, then zoom out. Reveal will step the highlight on each arrow press.

--

### Vertical slide

Press ↓ to navigate down, then → to continue.

Note: This is a vertical sub-slide. Useful for optional deep-dives.

---

## Math, native

Inline like $E = mc^2$, or block:

$$
\\int_0^{\\infty} e^{-x^2}\\,dx = \\frac{\\sqrt{\\pi}}{2}
$$

Note: KaTeX renders \`$...$\` and \`$$...$$\` automatically.

---

## Images, just drop them

Drag any **PNG**, **JPG**, **GIF**, or **SVG** into the editor — it gets inlined as base64 and stays inside your single file.

---

## Three actions, top-right

- ⬇ **Export Offline HTML** — share one file, anywhere
- 🖨️ **Print to PDF** — for handouts
- 📋 **Copy Markdown** — paste into any editor

---

# That's it. ✨

Happy presenting.`;

const $ = (id) => document.getElementById(id);
const editor        = $('editor');
const preview       = $('preview');
const charCountEl   = $('charCount');
const slideEl       = $('slideCount');
const syncToggle    = $('syncToggle');
const themeSelect   = $('themeSelect');
const fontSelect    = $('fontSelect');
const fileFallback  = $('fileFallback');
const notesEditor   = $('notesEditor');
const notesLabel    = $('notesLabel');
const editorSection = $('editorSection');
const dropOverlay   = $('dropOverlay');

const VALID_THEMES = ['black', 'white', 'league', 'serif'];
const themeUrl = (name) =>
  `https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/${name}.css`;

const VALID_FONTS = ['Inter','Roboto','Lato','Open Sans','Montserrat',
                     'Source Sans 3','Playfair Display','Merriweather','JetBrains Mono'];
const fontUrl = (name) =>
  `https://fonts.googleapis.com/css2?family=${encodeURIComponent(name).replace(/%20/g,'+')}:wght@400;600;700&display=swap`;

/* CSS that applies the chosen font to slide chrome but not to code. */
const fontOverrideCss = (name) => name
  ? `.reveal, .reveal h1, .reveal h2, .reveal h3, .reveal h4, .reveal h5, .reveal h6,
     .reveal p, .reveal li, .reveal blockquote, .reveal section { font-family: '${name}', sans-serif !important; }`
  : ``;

let currentBlobUrl   = null;
let renderTimer      = null;
let currentTheme     = 'black';
let currentFont      = '';
let currentSlideIdx  = 0;
let suppressNotesIn  = false;  // re-entry guard: ignore main-editor change events while we're rewriting it
let suppressNotesOut = false;  // re-entry guard: ignore notes change events while we're populating them
let dragDepth        = 0;      // tracks dragenter/leave nesting so the overlay only hides on real exit

/* Build a complete, standalone HTML document that renders the deck.
 * Used for: the live preview iframe, the Print-to-PDF window, and the
 * Export Offline HTML download — exactly the same CDN bundle every time.
 */
function buildPreviewDoc(markdown, { printMode = false, theme = currentTheme, font = currentFont } = {}) {
  const safeTheme = VALID_THEMES.includes(theme) ? theme : 'black';
  const safeFont  = VALID_FONTS.includes(font) ? font : '';
  const fontLink  = safeFont
    ? `<link rel="stylesheet" id="font-link" href="${fontUrl(safeFont)}">`
    : `<link rel="stylesheet" id="font-link" href="">`;
  const fontStyle = `<style id="font-style">${fontOverrideCss(safeFont)}</style>`;
  // The Markdown is embedded in a <textarea data-template>. The only
  // sequence that could break out of it is "</textarea>". Escape it.
  const safeMd = String(markdown).replace(/<\/textarea>/gi, '<\\/textarea>');

  // Reveal's print stylesheet — applied always-on in print mode, or
  // gated by media="print" so normal preview is untouched.
  const printLink = printMode
    ? `<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/css/print/pdf.css">`
    : `<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/css/print/pdf.css" media="print">`;

  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Slides</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reset.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
<link rel="stylesheet" href="${themeUrl(safeTheme)}" id="theme">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/highlight/monokai.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
${fontLink}
${fontStyle}
${printLink}
</head>
<body${printMode ? ' class="print-pdf"' : ''}>
<div class="reveal">
  <div class="slides">
    <section data-markdown
             data-separator="^---$"
             data-separator-vertical="^--$"
             data-separator-notes="^Note:">
      <textarea data-template>
${safeMd}
      </textarea>
    </section>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"><\/script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"><\/script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/markdown/markdown.js"><\/script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/highlight/highlight.js"><\/script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/notes/notes.js"><\/script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"><\/script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"><\/script>
<script>
  Reveal.initialize({
    hash: true,
    slideNumber: 'c/t',
    transition: 'slide',
    plugins: [ RevealMarkdown, RevealHighlight, RevealNotes ]
  }).then(() => {
    /* KaTeX may load slightly after Reveal — wait for it, then scan
     * the rendered slides for $...$ and $$...$$ blocks. */
    function tryMath() {
      if (typeof renderMathInElement === 'function') {
        renderMathInElement(document.body, {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '$',  right: '$',  display: false },
            { left: '\\\\(', right: '\\\\)', display: false },
            { left: '\\\\[', right: '\\\\]', display: true }
          ],
          ignoredTags: ['script','noscript','style','textarea','pre','code'],
          throwOnError: false
        });
      } else {
        setTimeout(tryMath, 80);
      }
    }
    tryMath();${printMode ? `
    setTimeout(() => window.print(), 800);` : ''}
  });
<\/script>
</body>
</html>`;
}

/* Re-render the preview iframe with the current Markdown. */
function renderPreview() {
  const html = buildPreviewDoc(editor.value);
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
  currentBlobUrl = url;
  preview.src = url;
}

/* Update char + slide counters in the toolbar. */
function updateStats() {
  const text = editor.value;
  charCountEl.textContent = text.length.toLocaleString();
  if (!text.trim()) { slideEl.textContent = '0'; return; }
  const horizontal = (text.match(/^---\s*$/gm) || []).length;
  slideEl.textContent = String(horizontal + 1);
}

/* Speaker notes — slide parsing & two-way sync ------------------- *
 *
 * Convention (matches Reveal): a slide is everything between bare
 * `---` lines; within a slide, a line starting with `Note:` marks
 * the beginning of speaker notes (everything from that line to the
 * end of the slide).
 */
function findSlideBounds(md) {
  const sepRe = /^---\s*$/gm;
  const seps = [];
  let m;
  while ((m = sepRe.exec(md)) !== null) {
    seps.push({ start: m.index, end: m.index + m[0].length });
  }
  const bounds = [];
  let prevEnd = 0;
  for (const s of seps) {
    bounds.push({ start: prevEnd, end: s.start });
    prevEnd = s.end;
  }
  bounds.push({ start: prevEnd, end: md.length });
  return bounds;
}

function extractNotesFromSlide(text) {
  const re = /(^|\n)Note:[ \t]*([\s\S]*)$/;
  const m = text.match(re);
  if (!m) return { content: text, notes: '' };
  // contentEnd points just before the matched leading newline (or at 0)
  const contentEnd = m.index + (m[1] === '\n' ? 0 : 0);
  return {
    content: text.slice(0, m.index).replace(/\s+$/, ''),
    notes: m[2].replace(/\s+$/, '')
  };
}

function getCurrentSlideIdx() {
  const cursor = editor.selectionStart || 0;
  const before = editor.value.slice(0, cursor);
  return (before.match(/^---\s*$/gm) || []).length;
}

function refreshNotesPanel() {
  if (suppressNotesOut) return;
  const md = editor.value;
  const bounds = findSlideBounds(md);
  const idx = Math.min(currentSlideIdx, bounds.length - 1);
  const slideText = md.slice(bounds[idx].start, bounds[idx].end);
  const { notes } = extractNotesFromSlide(slideText);
  suppressNotesOut = true;
  notesEditor.value = notes;
  suppressNotesOut = false;
  notesLabel.textContent = `Slide ${idx + 1} of ${bounds.length}`;
}

function writeNotesIntoSlide(idx, rawNotes) {
  const md = editor.value;
  const bounds = findSlideBounds(md);
  if (!bounds[idx]) return;
  const { start, end } = bounds[idx];
  const slideText = md.slice(start, end);
  const { content } = extractNotesFromSlide(slideText);

  const trimmed = rawNotes.replace(/\s+$/, '');
  let newSlide = content;
  if (trimmed) newSlide += '\n\nNote: ' + trimmed;

  // Restore the leading/trailing newline padding around the slide
  // so the surrounding `---` separators stay on their own lines.
  const leadingNl  = slideText.match(/^\n*/)[0];
  const trailingNl = slideText.match(/\n*$/)[0];
  const padded = leadingNl + newSlide.replace(/^\n+/, '').replace(/\n+$/, '') + trailingNl;

  const newMd = md.slice(0, start) + padded + md.slice(end);
  // Preserve cursor in the main editor (it isn't focused right now,
  // but jumping it to slide N+1 would be confusing if user clicks back).
  const cursor = editor.selectionStart;
  suppressNotesIn = true;
  editor.value = newMd;
  editor.selectionStart = editor.selectionEnd = Math.min(cursor, newMd.length);
  suppressNotesIn = false;

  updateStats();
  if (typeof scheduleSave === 'function') scheduleSave();
  if (syncToggle.checked) {
    clearTimeout(renderTimer);
    renderTimer = setTimeout(renderPreview, 220);
  }
}

function trackCursorSlide() {
  if (suppressNotesIn) return;
  const idx = getCurrentSlideIdx();
  if (idx === currentSlideIdx) {
    // Slide didn't change but content might have — keep label & notes fresh
    refreshNotesPanel();
    return;
  }
  currentSlideIdx = idx;
  refreshNotesPanel();
}

/* Debounced re-render driven by typing + the Sync toggle.
 * Also drives the localStorage auto-save (defined further down). */
function scheduleRender() {
  updateStats();
  if (typeof scheduleSave === 'function') scheduleSave();
  if (!syncToggle.checked) return;
  clearTimeout(renderTimer);
  renderTimer = setTimeout(renderPreview, 220);
}

editor.addEventListener('input', () => {
  scheduleRender();
  trackCursorSlide();
});
editor.addEventListener('keyup',  trackCursorSlide);
editor.addEventListener('click',  trackCursorSlide);
editor.addEventListener('select', trackCursorSlide);

notesEditor.addEventListener('input', () => {
  writeNotesIntoSlide(currentSlideIdx, notesEditor.value);
});

syncToggle.addEventListener('change', () => {
  if (syncToggle.checked) renderPreview();
});
$('refreshBtn').addEventListener('click', renderPreview);

/* Theme picker ----------------------------------------------------- *
 * Live-swap the theme stylesheet inside the iframe instead of
 * rebuilding the doc — keeps the user on the current slide and avoids
 * the brief reload flash. Falls back to a full re-render if the iframe
 * isn't ready yet (first paint or after Refresh).
 */
themeSelect.addEventListener('change', () => {
  currentTheme = themeSelect.value;
  const link = preview.contentDocument && preview.contentDocument.getElementById('theme');
  if (link) {
    link.href = themeUrl(currentTheme);
  } else {
    renderPreview();
  }
});

/* Font picker ----------------------------------------------------- *
 * Live-swap the Google Fonts <link> + override <style> in the iframe
 * so the slide font changes without a re-render. Also injects a copy
 * of the font into the editor page so the loaded font is cached when
 * the user toggles around. Falls through to renderPreview if the
 * iframe isn't there yet.
 */
function ensureFontLoadedInEditor(name) {
  if (!name) return;
  const id = 'editor-font-' + name.replace(/\W+/g, '-');
  if (document.getElementById(id)) return;
  const link = document.createElement('link');
  link.id = id;
  link.rel = 'stylesheet';
  link.href = fontUrl(name);
  document.head.appendChild(link);
}

fontSelect.addEventListener('change', () => {
  currentFont = fontSelect.value;
  ensureFontLoadedInEditor(currentFont);
  const doc = preview.contentDocument;
  if (!doc) { renderPreview(); return; }
  const link  = doc.getElementById('font-link');
  const style = doc.getElementById('font-style');
  if (link)  link.href  = currentFont ? fontUrl(currentFont) : '';
  if (style) style.textContent = fontOverrideCss(currentFont);
});

/* Image drag-and-drop → base64 ------------------------------------ *
 *
 * Drop an image anywhere over the editor section to insert
 * ![filename](data:image/...;base64,...) at the cursor. Uses
 * FileReader.readAsDataURL — fully local, no upload anywhere.
 */
function hasFiles(e) {
  return !!(e.dataTransfer && e.dataTransfer.types &&
            Array.prototype.includes.call(e.dataTransfer.types, 'Files'));
}

function fileToDataUri(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(file);
  });
}

function insertAtCursor(text) {
  editor.focus();
  const start = editor.selectionStart ?? editor.value.length;
  const end   = editor.selectionEnd   ?? editor.value.length;
  const next  = editor.value.slice(0, start) + text + editor.value.slice(end);
  editor.value = next;
  const caret = start + text.length;
  editor.selectionStart = editor.selectionEnd = caret;
  scheduleRender();
  trackCursorSlide();
}

editorSection.addEventListener('dragenter', (e) => {
  if (!hasFiles(e)) return;
  e.preventDefault();
  dragDepth++;
  dropOverlay.classList.remove('hidden');
});
editorSection.addEventListener('dragover', (e) => {
  if (!hasFiles(e)) return;
  e.preventDefault();
  if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
});
editorSection.addEventListener('dragleave', (e) => {
  if (!hasFiles(e)) return;
  dragDepth--;
  if (dragDepth <= 0) { dragDepth = 0; dropOverlay.classList.add('hidden'); }
});
editorSection.addEventListener('drop', async (e) => {
  if (!hasFiles(e)) return;
  e.preventDefault();
  e.stopPropagation();
  dragDepth = 0;
  dropOverlay.classList.add('hidden');

  const files = Array.from(e.dataTransfer.files || [])
    .filter(f => f.type.startsWith('image/') || /\.(svg|png|jpe?g|gif|webp)$/i.test(f.name));
  if (!files.length) return;

  const inserts = [];
  for (const file of files) {
    try {
      const data = await fileToDataUri(file);
      const altText = file.name.replace(/\.[^.]+$/, '');
      inserts.push(`![${altText}](${data})`);
    } catch {/* skip unreadable file */}
  }
  if (inserts.length) insertAtCursor(inserts.join('\n\n') + '\n');
}, true);  /* capture phase: beat the textarea's default drop */

/* Open .md from disk ---------------------------------------------- *
 * Prefer the File System Access API (Chromium). Fall back to a hidden
 * <input type="file"> for Firefox / Safari.
 */
async function openMarkdownFile() {
  try {
    if ('showOpenFilePicker' in window) {
      const [handle] = await window.showOpenFilePicker({
        types: [{
          description: 'Markdown',
          accept: { 'text/markdown': ['.md', '.markdown'], 'text/plain': ['.txt'] }
        }],
        excludeAcceptAllOption: false,
        multiple: false
      });
      const file = await handle.getFile();
      loadFileText(await file.text(), file.name);
    } else {
      fileFallback.value = '';
      fileFallback.click();
    }
  } catch (err) {
    if (err && err.name !== 'AbortError') {
      alert('Could not open file: ' + err.message);
    }
  }
}

fileFallback.addEventListener('change', async () => {
  const file = fileFallback.files && fileFallback.files[0];
  if (!file) return;
  loadFileText(await file.text(), file.name);
});

function loadFileText(text, name) {
  editor.value = text;
  currentSlideIdx = 0;
  updateStats();
  refreshNotesPanel();
  renderPreview();
  if (typeof scheduleSave === 'function') scheduleSave();
  flashBtn($('openBtn'), `✓ ${name.length > 18 ? name.slice(0,15) + '…' : name}`);
}

$('openBtn').addEventListener('click', openMarkdownFile);

/* Copy Markdown ---------------------------------------------------- */
$('copyBtn').addEventListener('click', async () => {
  const btn = $('copyBtn');
  try {
    await navigator.clipboard.writeText(editor.value);
  } catch {
    editor.select();
    document.execCommand('copy');
    window.getSelection()?.removeAllRanges();
  }
  flashBtn(btn, '✓ Copied!');
});

/* Print to PDF ----------------------------------------------------- */
$('pdfBtn').addEventListener('click', () => {
  const html = buildPreviewDoc(editor.value, { printMode: true });
  const w = window.open('', '_blank');
  if (!w) {
    alert('Please allow pop-ups for this page so Print to PDF can open the print view.');
    return;
  }
  w.document.open();
  w.document.write(html);
  w.document.close();
});

/* Export Offline HTML --------------------------------------------- */
$('exportBtn').addEventListener('click', () => {
  const html = buildPreviewDoc(editor.value);
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const ts   = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  a.href     = url;
  a.download = `slides-${ts}.html`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1500);
  flashBtn($('exportBtn'), '✓ Downloaded!');
});

/* Presenter Console ----------------------------------------------- *
 *
 * Opens a new window containing two iframes (current + next slide
 * preview) plus a sidebar with a stopwatch and the current slide's
 * speaker notes. The presenter window is same-origin with the editor
 * (both Blob URLs created here), so we can drive the deck iframes
 * with direct DOM/Reveal calls — no postMessage plumbing needed.
 */
function buildPresenterShell(deckUrl, theme) {
  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Presenter Console</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #0a0a0a; color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { display: flex; flex-direction: column; overflow: hidden; }
  header { display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; background: #111827; border-bottom: 1px solid #1f2937; }
  header .title { font-weight: 600; letter-spacing: 0.02em; }
  .timer { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 28px;
    color: #34d399; min-width: 100px; text-align: center; }
  .controls button {
    background: #374151; color: #f3f4f6; border: 0; border-radius: 6px;
    padding: 6px 12px; font-size: 13px; margin-left: 6px; cursor: pointer;
    transition: background 120ms;
  }
  .controls button:hover { background: #4b5563; }
  .controls button.primary { background: #10b981; color: #0a0a0a; font-weight: 600; }
  .controls button.primary:hover { background: #34d399; }
  main { flex: 1; display: grid; grid-template-columns: 1.55fr 1fr;
    gap: 8px; padding: 8px; min-height: 0; }
  .pane { background: #111827; border: 1px solid #1f2937; border-radius: 8px;
    display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .pane-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    padding: 6px 10px; background: #0f172a; color: #94a3b8;
    border-bottom: 1px solid #1f2937; flex: 0 0 auto; }
  .pane iframe { flex: 1; width: 100%; border: 0; background: #000; min-height: 0; }
  .right { display: grid; grid-template-rows: 1fr 1fr; gap: 8px; min-height: 0; }
  #notes { flex: 1; padding: 18px 22px; overflow: auto;
    font-size: 17px; line-height: 1.55; }
  #notes p { margin: 0 0 12px 0; }
  #notes code { background: #1f2937; padding: 1px 6px; border-radius: 3px;
    font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 0.9em; }
  #notes pre { background: #1f2937; padding: 10px 12px; border-radius: 4px;
    overflow: auto; }
  .empty { color: #64748b; font-style: italic; }
  footer { padding: 6px 16px; background: #0f172a; color: #64748b; font-size: 11px;
    border-top: 1px solid #1f2937; text-align: center; }
  kbd { background: #1f2937; padding: 1px 6px; border-radius: 3px;
    font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 0.85em; }
</style>
</head>
<body>
<header>
  <div class="title">🎤 Presenter Console <span style="color:#64748b; font-weight:400; margin-left:8px;">${theme} theme</span></div>
  <div class="timer" id="timer">00:00</div>
  <div class="controls">
    <button id="startBtn" class="primary">▶ Start</button>
    <button id="resetBtn">↺ Reset</button>
    <button id="prevBtn">←</button>
    <button id="nextBtn">→</button>
  </div>
</header>
<main>
  <section class="pane">
    <div class="pane-label">Current slide</div>
    <iframe id="currentDeck" src="${deckUrl}"></iframe>
  </section>
  <aside class="right">
    <section class="pane">
      <div class="pane-label">Up next</div>
      <iframe id="nextDeck" src="${deckUrl}"></iframe>
    </section>
    <section class="pane">
      <div class="pane-label">Speaker notes</div>
      <div id="notes"><p class="empty">Loading…</p></div>
    </section>
  </aside>
</main>
<footer>
  <kbd>←</kbd> / <kbd>→</kbd> navigate · <kbd>Space</kbd> next · <kbd>F</kbd> fullscreen the current pane
</footer>
<script>
  const cur  = document.getElementById('currentDeck');
  const nxt  = document.getElementById('nextDeck');
  const notesEl = document.getElementById('notes');
  const timerEl = document.getElementById('timer');

  /* Stopwatch */
  let elapsed = 0, running = false, lastTick = 0, rafId = null;
  function fmt(s) {
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), x = s%60;
    return (h ? String(h).padStart(2,'0') + ':' : '')
         + String(m).padStart(2,'0') + ':' + String(x).padStart(2,'0');
  }
  function tick() {
    if (!running) return;
    const now = Date.now();
    elapsed += (now - lastTick) / 1000;
    lastTick = now;
    timerEl.textContent = fmt(Math.floor(elapsed));
    rafId = requestAnimationFrame(tick);
  }
  document.getElementById('startBtn').addEventListener('click', () => {
    if (running) { running = false; document.getElementById('startBtn').textContent = '▶ Resume'; }
    else { running = true; lastTick = Date.now(); document.getElementById('startBtn').textContent = '⏸ Pause'; tick(); }
  });
  document.getElementById('resetBtn').addEventListener('click', () => {
    running = false; elapsed = 0;
    document.getElementById('startBtn').textContent = '▶ Start';
    timerEl.textContent = fmt(0);
  });

  /* Deck wiring */
  function whenReady(iframe) {
    return new Promise((resolve) => {
      const check = () => {
        const w = iframe.contentWindow;
        if (w && w.Reveal && w.Reveal.isReady && w.Reveal.isReady()) resolve(w.Reveal);
        else setTimeout(check, 60);
      };
      iframe.addEventListener('load', check);
      check();
    });
  }
  function renderNotes(slide) {
    if (!slide) { notesEl.innerHTML = '<p class="empty">End of deck.</p>'; return; }
    const aside = slide.querySelector('aside.notes');
    if (aside && aside.innerHTML.trim()) {
      notesEl.innerHTML = aside.innerHTML;
    } else {
      notesEl.innerHTML = '<p class="empty">No notes for this slide.</p>';
    }
  }
  function syncFromCurrent(curReveal, nxtReveal) {
    const i = curReveal.getIndices();
    renderNotes(curReveal.getCurrentSlide());
    // Advance the "next" iframe one slide ahead (vertical first, fallback horizontal)
    const totalH = curReveal.getTotalSlides();
    const target = curReveal.availableRoutes && curReveal.availableRoutes().down
      ? { h: i.h, v: (i.v || 0) + 1 }
      : { h: i.h + 1, v: 0 };
    nxtReveal.slide(target.h, target.v);
  }

  Promise.all([whenReady(cur), whenReady(nxt)]).then(([curReveal, nxtReveal]) => {
    curReveal.on('slidechanged', () => syncFromCurrent(curReveal, nxtReveal));
    syncFromCurrent(curReveal, nxtReveal);

    /* Navigation: keys + buttons drive the current deck. */
    const next = () => curReveal.next();
    const prev = () => curReveal.prev();
    document.getElementById('nextBtn').addEventListener('click', next);
    document.getElementById('prevBtn').addEventListener('click', prev);
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); next(); }
      else if (e.key === 'ArrowLeft' || e.key === 'PageUp')                  { e.preventDefault(); prev(); }
      else if (e.key === 'f' || e.key === 'F')                                { cur.requestFullscreen?.(); }
    });
  });

  /* Revoke the deck Blob URL on close so memory is reclaimed. */
  window.addEventListener('beforeunload', () => {
    try { URL.revokeObjectURL(${JSON.stringify(deckUrl)}); } catch {}
  });
<\/script>
</body>
</html>`;
}

$('presenterBtn').addEventListener('click', () => {
  const deckHtml = buildPreviewDoc(editor.value);
  const deckBlob = new Blob([deckHtml], { type: 'text/html;charset=utf-8' });
  const deckUrl  = URL.createObjectURL(deckBlob);

  const shellHtml = buildPresenterShell(deckUrl, currentTheme);
  const shellBlob = new Blob([shellHtml], { type: 'text/html;charset=utf-8' });
  const shellUrl  = URL.createObjectURL(shellBlob);

  const win = window.open(shellUrl, '_blank',
    'popup,width=1280,height=800,left=120,top=80');
  if (!win) {
    URL.revokeObjectURL(deckUrl);
    URL.revokeObjectURL(shellUrl);
    alert('Please allow pop-ups so the Presenter Console can open.');
    return;
  }
  // Revoke the shell URL once the window has parsed it. The shell
  // revokes the deck URL itself in its beforeunload handler.
  setTimeout(() => URL.revokeObjectURL(shellUrl), 5000);
  flashBtn($('presenterBtn'), '✓ Opened');
});

/* Tiny visual confirmation on a button after an action. */
function flashBtn(btn, text) {
  const original = btn.textContent;
  btn.textContent = text;
  btn.disabled = true;
  btn.classList.add('pulse-ok');
  setTimeout(() => {
    btn.textContent = original;
    btn.disabled = false;
    btn.classList.remove('pulse-ok');
  }, 1200);
}

/* Persistence + URL sharing -------------------------------------- *
 *
 * Two complementary stores:
 *   • localStorage — auto-saves on every edit; survives refresh.
 *   • URL hash     — pako-deflated + base64url-encoded markdown,
 *                    plus theme/font params; lets you ship a deck
 *                    in a single link with no server.
 */
const STORAGE_KEY = 'markdown-slideshow:v1';

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      md:    editor.value,
      theme: currentTheme,
      font:  currentFont,
      sync:  syncToggle.checked,
      ts:    Date.now()
    }));
  } catch { /* QuotaExceeded etc. — fail silently */ }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    return obj && typeof obj.md === 'string' ? obj : null;
  } catch { return null; }
}

let saveTimer = null;
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveState, 400);
}

/* base64url <-> Uint8Array — URL-safe, no padding. */
function bytesToB64Url(bytes) {
  let bin = '';
  const chunk = 0x8000;
  for (let i = 0; i < bytes.length; i += chunk) {
    bin += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
  }
  return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
function b64UrlToBytes(s) {
  const pad = (4 - (s.length % 4)) % 4;
  const b64 = (s + '='.repeat(pad)).replace(/-/g, '+').replace(/_/g, '/');
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

function buildShareUrl() {
  if (typeof pako === 'undefined') return null;
  const bytes = pako.deflate(new TextEncoder().encode(editor.value), { level: 9 });
  const m = bytesToB64Url(bytes);
  const params = new URLSearchParams();
  params.set('m', m);
  if (currentTheme && currentTheme !== 'black') params.set('t', currentTheme);
  if (currentFont) params.set('f', currentFont);
  return location.origin + location.pathname + '#' + params.toString();
}

function readSharedFromUrl() {
  if (typeof pako === 'undefined') return null;
  const hash = location.hash.replace(/^#/, '');
  if (!hash) return null;
  const params = new URLSearchParams(hash);
  const m = params.get('m');
  if (!m) return null;
  try {
    const bytes = b64UrlToBytes(m);
    const md    = new TextDecoder().decode(pako.inflate(bytes));
    return {
      md,
      theme: VALID_THEMES.includes(params.get('t')) ? params.get('t') : null,
      font:  VALID_FONTS.includes(params.get('f'))  ? params.get('f')  : null
    };
  } catch {
    return null;
  }
}

$('shareBtn').addEventListener('click', async () => {
  const btn = $('shareBtn');
  const url = buildShareUrl();
  if (!url) { alert('Compression library still loading — try again in a second.'); return; }
  try {
    await navigator.clipboard.writeText(url);
  } catch {
    /* clipboard blocked — show a prompt fallback */
    window.prompt('Copy this share URL:', url);
  }
  const kb = (url.length / 1024).toFixed(1);
  flashBtn(btn, url.length > 8000 ? `✓ Copied (${kb} KB · long!)` : `✓ Copied ${kb} KB`);
});

/* Pull saves through the change pipelines. (scheduleRender already
 * calls scheduleSave internally — see definition above.) */
themeSelect.addEventListener('change', scheduleSave);
fontSelect.addEventListener('change', scheduleSave);
syncToggle.addEventListener('change', scheduleSave);

/* Boot ------------------------------------------------------------- *
 *
 * Priority: shared URL → localStorage → built-in sample.
 * If we loaded from URL, we *also* write to localStorage and clear
 * the hash so a manual refresh keeps the user's edits instead of
 * snapping back to whatever was in the link.
 */
const shared = readSharedFromUrl();
const saved  = shared ? null : loadState();

if (shared) {
  editor.value = shared.md;
  if (shared.theme) { currentTheme = shared.theme; themeSelect.value = currentTheme; }
  if (shared.font)  { currentFont  = shared.font;  fontSelect.value  = currentFont; }
  saveState();
  history.replaceState(null, '', location.pathname);
} else if (saved) {
  editor.value = saved.md || SAMPLE;
  if (VALID_THEMES.includes(saved.theme)) { currentTheme = saved.theme; themeSelect.value = currentTheme; }
  if (VALID_FONTS.includes(saved.font))   { currentFont  = saved.font;  fontSelect.value  = currentFont; }
  if (typeof saved.sync === 'boolean')    { syncToggle.checked = saved.sync; }
} else {
  editor.value = SAMPLE;
}

updateStats();
refreshNotesPanel();
renderPreview();
</script>
</body>
</html>
